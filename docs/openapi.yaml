openapi: 3.1.0
info:
  title: kAIxU Gate API
  version: 1.0.0
  description: |
    kAIxU is a hardened AI gateway running on Cloudflare Workers.
    All generation, streaming, and embedding calls are proxied through the gate.
    The underlying AI provider is abstracted — callers only ever see kAIxU model names.
  contact:
    name: Skyes Over London
    url: https://kaixu67.skyesoverlondon.workers.dev
  license:
    name: Proprietary

servers:
  - url: https://kaixu67.skyesoverlondon.workers.dev
    description: Production

security:
  - bearerToken: []
  - headerToken: []

tags:
  - name: Status
    description: Health and model discovery
  - name: Generation
    description: Text generation (blocking and streaming)
  - name: Embeddings
    description: Text-to-vector embeddings

paths:
  /v1/health:
    get:
      operationId: getHealth
      summary: Health check
      tags: [Status]
      description: |
        Confirms the gateway is up and the provided token is valid.
        Returns configuration state — useful for verifying env setup.
      responses:
        '200':
          description: Gateway is healthy
          headers:
            X-Request-ID:
              $ref: '#/components/headers/X-Request-ID'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'

  /v1/models:
    get:
      operationId: listModels
      summary: List available models
      tags: [Status]
      description: Returns the list of models available through the gateway. No auth required.
      security: []
      responses:
        '200':
          description: Model list
          headers:
            X-Request-ID:
              $ref: '#/components/headers/X-Request-ID'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ModelsResponse'

  /v1/generate:
    post:
      operationId: generate
      summary: Generate text (blocking)
      tags: [Generation]
      description: |
        Sends a prompt to the AI and returns the complete response.
        KAIXU_CANON is automatically prepended to every system instruction.
        `safetySettings` in the request body are stripped — the gateway enforces its own policy.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/GenerateRequest'
            examples:
              simple:
                summary: Simple prompt
                value:
                  input:
                    type: text
                    content: Explain WebSockets in one paragraph.
              with_system:
                summary: With system instructions
                value:
                  system: You are a concise legal assistant.
                  model: kAIxU6.7-flash
                  input:
                    type: text
                    content: What is habeas corpus?
              multi_turn:
                summary: Multi-turn conversation
                value:
                  messages:
                    - role: user
                      content: My name is Skye.
                    - role: assistant
                      content: Hello Skye, how can I help you?
                    - role: user
                      content: What is my name?
              json_output:
                summary: JSON output mode
                value:
                  output:
                    format: json
                  input:
                    type: text
                    content: Return a JSON object with name, capital, population for France.
      responses:
        '200':
          description: Generation result (check `ok` field — can be false on MAX_TOKENS)
          headers:
            X-Request-ID:
              $ref: '#/components/headers/X-Request-ID'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GenerateResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '413':
          $ref: '#/components/responses/TooLarge'
        '429':
          $ref: '#/components/responses/RateLimited'
        '500':
          $ref: '#/components/responses/ServerError'
        '502':
          $ref: '#/components/responses/UpstreamError'

  /v1/stream:
    post:
      operationId: stream
      summary: Generate text (SSE streaming)
      tags: [Generation]
      description: |
        Same as `/v1/generate` but streams tokens in real time via Server-Sent Events.

        **⚠ Do NOT use from Netlify-hosted apps.** Netlify's CDN buffers the entire
        response before delivery — SSE will appear broken. Use `/v1/generate` instead.

        Works from: direct browser calls, Cloudflare Workers, Vercel Edge, self-hosted servers.

        SSE format: each `data:` line contains a JSON chunk with
        `candidates[].content.parts[]`. Filter out parts where `thought: true` (internal
        reasoning tokens). Ends with `data: [DONE]`.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/GenerateRequest'
      responses:
        '200':
          description: SSE stream
          headers:
            X-Request-ID:
              $ref: '#/components/headers/X-Request-ID'
          content:
            text/event-stream:
              schema:
                type: string
                description: |
                  Server-sent events stream. Each event:
                  `data: {"candidates":[{"content":{"parts":[{"text":"..."}]}}]}`
                  Terminated by: `data: [DONE]`
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '413':
          $ref: '#/components/responses/TooLarge'
        '429':
          $ref: '#/components/responses/RateLimited'
        '500':
          $ref: '#/components/responses/ServerError'
        '502':
          $ref: '#/components/responses/UpstreamError'

  /v1/embeddings:
    post:
      operationId: embed
      summary: Embed text (vectorize)
      tags: [Embeddings]
      description: |
        Converts text to float vectors. No KAIXU_CANON, no system prompt — embeddings
        are pure text-to-vector operations.

        Supports single string or array of strings (batch). Batch uses one round trip.

        **Note:** `usage.totalTokens` is `0` for batch requests — upstream limitation.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/EmbedRequest'
            examples:
              single:
                summary: Single string
                value:
                  content: The quick brown fox jumps over the lazy dog.
              batch:
                summary: Batch
                value:
                  content:
                    - First document to embed.
                    - Second document to embed.
                    - Third document to embed.
              with_task_type:
                summary: With taskType
                value:
                  content: How do I reverse a linked list?
                  taskType: RETRIEVAL_QUERY
      responses:
        '200':
          description: Embedding vectors
          headers:
            X-Request-ID:
              $ref: '#/components/headers/X-Request-ID'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EmbedResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '413':
          $ref: '#/components/responses/TooLarge'
        '429':
          $ref: '#/components/responses/RateLimited'
        '500':
          $ref: '#/components/responses/ServerError'
        '502':
          $ref: '#/components/responses/UpstreamError'

components:
  securitySchemes:
    bearerToken:
      type: http
      scheme: bearer
      description: Token in `Authorization: Bearer <token>` header
    headerToken:
      type: apiKey
      in: header
      name: X-KAIXU-TOKEN
      description: Alternative to Bearer — same token, different header

  headers:
    X-Request-ID:
      description: Unique request identifier for log correlation (also in admin dashboard)
      schema:
        type: string
        example: req_m7k2x9p

  schemas:
    GenerateRequest:
      type: object
      description: |
        At least one of `input`, `messages`, or `contents` is required.
      properties:
        model:
          type: string
          enum: [kAIxU6.7-flash, kAIxU6.7-pro]
          default: kAIxU6.7-flash
          description: Model to use. Defaults to kAIxU6.7-flash. Provider is always Skyes Over London.
        input:
          type: object
          description: Single-turn input
          properties:
            type:
              type: string
              enum: [text]
              default: text
            content:
              type: string
              description: Prompt text
          required: [content]
        messages:
          type: array
          description: Multi-turn conversation history (role/content message format)
          items:
            type: object
            properties:
              role:
                type: string
                enum: [user, assistant]
              content:
                type: string
            required: [role, content]
        contents:
          type: array
          description: Native upstream format (alternative to messages)
          items:
            type: object
        system:
          type: string
          description: |
            Per-request system instructions. Appended after KAIXU_CANON — additive,
            not a replacement. Do NOT re-send KAIXU_CANON here.
        generationConfig:
          type: object
          description: Generation parameters forwarded verbatim
          properties:
            temperature:
              type: number
              minimum: 0
              maximum: 2
            topP:
              type: number
              minimum: 0
              maximum: 1
            maxOutputTokens:
              type: integer
              minimum: 1
              maximum: 65536
            stopSequences:
              type: array
              items:
                type: string
        output:
          type: object
          description: Response format
          properties:
            format:
              type: string
              enum: [json, text, markdown]
        tools:
          type: array
          description: Function calling tools
          items:
            type: object
        toolConfig:
          type: object
          description: Tool use configuration
        includeRaw:
          type: boolean
          default: false
          description: Include raw upstream response at `.raw`

    GenerateResponse:
      type: object
      properties:
        ok:
          type: boolean
          description: false if generation failed or was cut off (check `error`)
        model:
          type: string
          example: kAIxU6.7-flash
        text:
          type: string
          description: Generated text. Empty string if MAX_TOKENS with no output.
        finishReason:
          type: string
          enum: [STOP, MAX_TOKENS, SAFETY, RECITATION, OTHER]
          description: STOP = complete. MAX_TOKENS = cut off — raise maxOutputTokens.
        usage:
          type: object
          properties:
            promptTokens:
              type: integer
            candidatesTokens:
              type: integer
            thoughtsTokens:
              type: integer
              description: Internal reasoning tokens (kAIxU6.7-pro only)
            totalTokens:
              type: integer
        error:
          type: string
          description: Present when ok is false
        requestId:
          type: string
        raw:
          description: Raw upstream response (only when includeRaw=true)

    EmbedRequest:
      type: object
      required: [content]
      properties:
        content:
          oneOf:
            - type: string
              description: Single text to embed
            - type: array
              items:
                type: string
              description: Batch of texts — one round trip
        model:
          type: string
          enum: [text-embedding-004, embedding-001]
          default: text-embedding-004
          description: Embedding model. text-embedding-004 is recommended.
        taskType:
          type: string
          description: Hint for embedding optimization
          enum:
            - RETRIEVAL_DOCUMENT
            - RETRIEVAL_QUERY
            - SEMANTIC_SIMILARITY
            - CLASSIFICATION
            - CLUSTERING
            - QUESTION_ANSWERING
            - FACT_VERIFICATION

    EmbedResponse:
      type: object
      properties:
        ok:
          type: boolean
        model:
          type: string
          example: kAIxU6.7-embed
        embeddings:
          type: array
          items:
            type: object
            properties:
              index:
                type: integer
              values:
                type: array
                items:
                  type: number
                description: 768-dimensional float vector
        usage:
          type: object
          properties:
            totalTokens:
              type: integer
              description: 0 for batch requests (upstream limitation)
        error:
          type: string

    HealthResponse:
      type: object
      properties:
        ok:
          type: boolean
        name:
          type: string
          example: Kaixu Gate Delta
        runtime:
          type: string
          example: cloudflare-workers
        kAIxu:
          type: boolean
        keyConfigured:
          type: boolean
        authConfigured:
          type: boolean
        openGate:
          type: boolean
        time:
          type: string
          format: date-time

    ModelsResponse:
      type: object
      properties:
        ok:
          type: boolean
        provider:
          type: string
          example: Skyes Over London
        defaultModel:
          type: string
          example: kAIxU6.7-flash
        models:
          type: array
          items:
            type: object
            properties:
              id:
                type: string
                example: kAIxU6.7-flash
              provider:
                type: string
                example: Skyes Over London
              label:
                type: string
                example: kAIxU6.7 Flash — Skyes Over London (fast, recommended)

    ErrorResponse:
      type: object
      properties:
        ok:
          type: boolean
          example: false
        error:
          type: string
        requestId:
          type: string

  responses:
    BadRequest:
      description: Missing required field, invalid model, bad JSON, or body >5MB
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    Unauthorized:
      description: Missing token
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    Forbidden:
      description: Invalid, revoked, expired, or quota-exceeded token
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          examples:
            revoked:
              value: { ok: false, error: "Invalid app token. (revoked)" }
            expired:
              value: { ok: false, error: "Invalid app token. (expired)" }
            quota:
              value: { ok: false, error: "Invalid app token. (quota_exceeded)" }
    TooLarge:
      description: Request body exceeds 5MB limit
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    RateLimited:
      description: Rate limit exceeded
      headers:
        Retry-After:
          schema:
            type: integer
          description: Seconds until the limit resets
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    ServerError:
      description: Gateway misconfigured (missing API key env var)
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    UpstreamError:
      description: Upstream AI network error
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
