<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>offlinePackKai — offline pack manager</title>
<style>
:root{--bg:#06060d;--fg:#f7f8ff;--muted:#a2a7c4;--border:rgba(255,255,255,.12);}*{box-sizing:border-box}
body{margin:0;min-height:100vh;font-family:'Segoe UI',system-ui,sans-serif;background:radial-gradient(circle at 18% 18%,rgba(0,243,255,.08),transparent 36%),radial-gradient(circle at 78% 12%,rgba(255,211,106,.08),transparent 32%),#06060d;color:var(--fg);padding:24px}
.card{max-width:900px;margin:0 auto;background:rgba(255,255,255,.04);border:1px solid var(--border);border-radius:18px;padding:22px;backdrop-filter:blur(10px);box-shadow:0 30px 80px rgba(0,0,0,.45)}
h1{margin:0 0 8px;font-size:22px;letter-spacing:.3px}
p{margin:0 0 12px;color:var(--muted)}
button{cursor:pointer;padding:10px 14px;border-radius:14px;border:1px solid var(--border);background:linear-gradient(180deg,rgba(0,243,255,.18),rgba(0,243,255,.07));color:var(--fg);font-weight:700;letter-spacing:.2px;box-shadow:0 12px 40px rgba(0,0,0,.45);transition:transform .08s ease}
button:active{transform:translateY(1px) scale(.99)}
.row{display:flex;flex-wrap:wrap;gap:10px;margin:12px 0;align-items:center}
pre{margin:0;white-space:pre-wrap;word-break:break-word;color:var(--muted);background:rgba(0,0,0,.3);border:1px solid var(--border);border-radius:14px;padding:12px;min-height:120px}
.badge{display:inline-flex;align-items:center;gap:6px;padding:7px 10px;border-radius:999px;border:1px solid var(--border);background:rgba(0,0,0,.28);color:var(--muted);font-size:12px}
.dot{width:10px;height:10px;border-radius:50%;background:rgba(255,255,255,.3);box-shadow:0 0 14px rgba(0,243,255,.4)}
.ok .dot{background:rgba(0,255,170,.8);box-shadow:0 0 14px rgba(0,255,170,.6)}
.off .dot{background:rgba(255,90,110,.85);box-shadow:0 0 14px rgba(255,90,110,.45)}
textarea{width:100%;min-height:130px;border-radius:12px;border:1px solid var(--border);background:rgba(0,0,0,.3);color:var(--fg);padding:10px}
</style>
</head>
<body>
  <div class="card">
    <div style="display:flex;justify-content:space-between;align-items:center;gap:10px;flex-wrap:wrap">
      <div>
        <h1>offlinePackKai</h1>
        <p>Build a custom offline pack, preflight each URL, and cache it in one click.</p>
      </div>
      <div class="badge" id="pill"><span class="dot"></span><span id="pillText">Checking…</span></div>
    </div>

    <div class="row">
      <button id="btnPrecache">Precache pack</button>
      <button id="btnDrop">Drop pack</button>
      <button id="btnList">List pack entries</button>
      <button id="btnCheck">Preflight check URLs</button>
      <button id="btnReset">Reset defaults</button>
    </div>

    <div style="font-size:12px;color:var(--muted);margin-bottom:6px">Pack URLs (one per line)</div>
    <textarea id="urls"></textarea>

    <div style="margin-top:12px"><pre id="log">(waiting)</pre></div>
    <div style="font-size:12px;color:var(--muted);margin-top:10px">Cache key: <strong>kaixu-offline-pack-v1</strong>. Uses Cache API only.</div>
  </div>
<script>
  const CACHE_NAME='kaixu-offline-pack-v1';
  const listKey='kaixuOfflinePackUrls';
  const defaultUrls=['/','/index.html','/InnerSanctum.html','/gateway.html','/kAIxUchat.html','/sw.js','/coverKai.html','/codeKai.html','/briefKai.html','/resumeKai.html'];
  const logEl=document.getElementById('log');
  const pill=document.getElementById('pill');
  const pillText=document.getElementById('pillText');
  const urlsEl=document.getElementById('urls');

  urlsEl.value=(JSON.parse(localStorage.getItem(listKey)||'null')||defaultUrls).join('\n');
  urlsEl.addEventListener('input',persist);

  function persist(){ localStorage.setItem(listKey, JSON.stringify(getUrls())); }
  function getUrls(){ return [...new Set(urlsEl.value.split(/\r?\n/).map(s=>s.trim()).filter(Boolean))]; }
  function setPill(ok,msg){pill.classList.toggle('ok',ok);pill.classList.toggle('off',!ok);pillText.textContent=msg;}
  function log(msg){logEl.textContent=msg;}

  async function precache(){
    const urls=getUrls();
    try{
      const c=await caches.open(CACHE_NAME);
      await c.addAll(urls);
      log(`Cached ${urls.length} URLs. Pack ready.`);
      setPill(true,'Pack ready');
    }catch(e){
      log('Error precaching: '+(e.message||e));
      setPill(false,'Error');
    }
  }

  async function drop(){
    try{await caches.delete(CACHE_NAME);log('Pack removed.');setPill(false,'No pack');}
    catch(e){log('Error deleting: '+(e.message||e));}
  }

  async function list(){
    try{
      const keys=await caches.keys();
      const has=keys.includes(CACHE_NAME);
      setPill(has,'Pack '+(has?'ready':'missing'));
      if(!has){log('No pack yet.');return;}
      const c=await caches.open(CACHE_NAME);
      const reqs=await c.keys();
      log(reqs.map(r=>r.url.replace(location.origin,'')).join('\n')||'(empty)');
    }catch(e){log('Error listing: '+(e.message||e));}
  }

  async function preflight(){
    const urls=getUrls();
    const out=[];
    for(const url of urls){
      try{
        const res=await fetch(url,{cache:'no-store'});
        out.push(`${res.ok?'OK ':'BAD'} ${res.status}  ${url}`);
      }catch(e){ out.push(`ERR      ${url}`); }
    }
    log(out.join('\n'));
  }

  document.getElementById('btnPrecache').onclick=precache;
  document.getElementById('btnDrop').onclick=drop;
  document.getElementById('btnList').onclick=list;
  document.getElementById('btnCheck').onclick=preflight;
  document.getElementById('btnReset').onclick=()=>{urlsEl.value=defaultUrls.join('\n');persist();log('Reset to defaults.');};

  setPill(navigator.onLine,'Online');
  list();
</script>
</body>
</html>
