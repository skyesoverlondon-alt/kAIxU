<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>quickPaletteKai — global launcher</title>
<style>
:root{--bg:#05060d;--fg:#f6f7ff;--muted:#9aa0bc;--border:rgba(255,255,255,.12);}*{box-sizing:border-box}
body{margin:0;min-height:100vh;font-family:'Segoe UI',system-ui,sans-serif;background:radial-gradient(circle at 18% 18%,rgba(0,243,255,.08),transparent 36%),radial-gradient(circle at 78% 12%,rgba(255,211,106,.08),transparent 32%),#05060d;color:var(--fg);padding:24px}
.card{max-width:820px;margin:0 auto;background:rgba(255,255,255,.04);border:1px solid var(--border);border-radius:18px;padding:22px;backdrop-filter:blur(10px);box-shadow:0 30px 80px rgba(0,0,0,.45)}
h1{margin:0 0 8px;font-size:22px;letter-spacing:.3px}
p{margin:0 0 12px;color:var(--muted)}
button{cursor:pointer;padding:10px 14px;border-radius:14px;border:1px solid var(--border);background:linear-gradient(180deg,rgba(0,243,255,.18),rgba(0,243,255,.07));color:var(--fg);font-weight:700;letter-spacing:.2px;box-shadow:0 12px 40px rgba(0,0,0,.45);transition:transform .08s ease}
button:active{transform:translateY(1px) scale(.99)}
.overlay{position:fixed;inset:0;display:none;align-items:flex-start;justify-content:center;background:rgba(0,0,0,.45);backdrop-filter:blur(6px);z-index:10}
.overlay.active{display:flex}
.box{margin-top:80px;width:min(640px,90%);background:#0b0c14;border:1px solid var(--border);border-radius:16px;box-shadow:0 25px 70px rgba(0,0,0,.65);overflow:hidden}
.box input{width:100%;padding:14px 16px;border:none;outline:none;background:rgba(255,255,255,.04);color:#fff;font-size:14px}
.list{max-height:360px;overflow:auto}
.item{padding:12px 16px;border-top:1px solid rgba(255,255,255,.06);display:flex;justify-content:space-between;align-items:center;cursor:pointer;background:transparent;color:#e8e8f5;font-size:13px}
.item:hover,.item.active{background:rgba(0,243,255,.08)}
.sub{color:#8a8ab3;font-size:12px}
.k{font-family:'SFMono-Regular',Consolas,monospace;font-size:11px;color:#9aa0bc}
</style>
</head>
<body>
  <div class="card">
    <h1>quickPaletteKai</h1>
    <p>Global launcher with full app index, keyboard navigation, and recent actions.</p>
    <button id="open">Open palette</button>
    <div style="margin-top:10px;font-size:12px;color:var(--muted);">Keyboard: Cmd/Ctrl+K open · ↑↓ move · Enter launch · Esc close.</div>
  </div>

  <div class="overlay" id="pal" aria-hidden="true">
    <div class="box">
      <input id="input" placeholder="Jump to app or action" autofocus />
      <div class="list" id="list"></div>
    </div>
  </div>
<script>
  const pal=document.getElementById('pal');
  const input=document.getElementById('input');
  const list=document.getElementById('list');
  const baseActions=[
    {label:'⬡ Gateway', sub:'Open Gate Xnth', href:'/gateway.html'},
    {label:'✦ Chat', sub:'Open kAIxUchat', href:'/kAIxUchat.html'},
    {label:'🩺 Watchdog', sub:'SW/cache health', href:'/watchdogKai.html'},
    {label:'⚙ Env switch', sub:'Prod/Stage', href:'/liveModeKai.html'},
    {label:'⏭ Skip intro', sub:'Toggle skip flag', action:()=>{localStorage.setItem('kaixuIntroSkip','1');alert('Skip enabled');}},
    {label:'⏮ Enable intro', sub:'Remove skip flag', action:()=>{localStorage.removeItem('kaixuIntroSkip');alert('Skip removed');}},
    {label:'📦 Offline pack', sub:'Precache shell', href:'/offlinePackKai.html'},
    {label:'🎨 Theme reactor', sub:'Set theme', href:'/themeReactorKai.html'}
  ];
  let actions=[...baseActions];
  let filtered=actions;
  let activeIdx=0;
  const recentsKey='kaixuQuickPaletteRecents';

  function pushRecent(act){
    if(!act || !act.label) return;
    const cur=JSON.parse(localStorage.getItem(recentsKey)||'[]').filter(x=>x.label!==act.label);
    cur.unshift({label:act.label,sub:act.sub,href:act.href||''});
    localStorage.setItem(recentsKey,JSON.stringify(cur.slice(0,8)));
  }

  async function loadCatalog(){
    try{
      const html=await fetch('/index.html',{cache:'no-store'}).then(r=>r.text());
      const start=html.indexOf('const APPS = [');
      const end=html.indexOf('];',start);
      if(start===-1||end===-1) return;
      const block=html.slice(start,end+2);
      const rx=/\{[\s\S]*?icon:\s*'([^']+)'[\s\S]*?name:\s*'([^']+)'[\s\S]*?tagline:\s*'([^']+)'[\s\S]*?url:\s*'([^']+)'[\s\S]*?\}/g;
      const appActions=[];
      for(const m of block.matchAll(rx)){
        appActions.push({label:`${m[1]} ${m[2]}`,sub:m[3],href:m[4]});
      }
      const recents=JSON.parse(localStorage.getItem(recentsKey)||'[]').map(r=>({label:`🕘 ${r.label}`,sub:r.sub||'Recent',href:r.href||''}));
      actions=[...recents,...baseActions,...appActions];
      render();
    }catch{}
  }

  function render(){
    const q=input.value.toLowerCase();
    filtered=actions.filter(a=>!q||a.label.toLowerCase().includes(q)||a.sub.toLowerCase().includes(q));
    if(activeIdx>=filtered.length) activeIdx=0;
    list.innerHTML=filtered.map((a,i)=>`<div class="item ${i===activeIdx?'active':''}" data-idx="${i}"><div>${a.label}<div class="sub">${a.sub}</div></div><div class="k">↵</div></div>`).join('');
  }
  function open(){pal.classList.add('active');pal.setAttribute('aria-hidden','false');input.value='';render();setTimeout(()=>input.focus(),10);}
  function close(){pal.classList.remove('active');pal.setAttribute('aria-hidden','true');}
  function runAction(act){
    if(!act) return;
    pushRecent(act);
    if(act.action) act.action();
    else if(act.href) location.href=act.href;
    close();
  }
  list.addEventListener('click',e=>{const item=e.target.closest('.item');if(!item)return;runAction(filtered[Number(item.dataset.idx)]);});
  document.getElementById('open').onclick=open;
  input.addEventListener('input',()=>{activeIdx=0;render();});
  document.addEventListener('keydown',e=>{
    if((e.metaKey||e.ctrlKey)&&e.key.toLowerCase()==='k'){e.preventDefault();open();return;}
    if(!pal.classList.contains('active')) return;
    if(e.key==='Escape'){close();return;}
    if(e.key==='ArrowDown'){e.preventDefault();activeIdx=Math.min(filtered.length-1,activeIdx+1);render();return;}
    if(e.key==='ArrowUp'){e.preventDefault();activeIdx=Math.max(0,activeIdx-1);render();return;}
    if(e.key==='Enter'){e.preventDefault();runAction(filtered[activeIdx]);}
  });
  pal.addEventListener('click',e=>{if(e.target===pal)close();});
  loadCatalog();
</script>
</body>
</html>
