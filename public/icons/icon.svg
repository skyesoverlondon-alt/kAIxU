<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d0b1a"/>
      <stop offset="100%" style="stop-color:#050410"/>
    </linearGradient>
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffd55a"/>
      <stop offset="100%" style="stop-color:#ffb800"/>
    </linearGradient>
    <linearGradient id="violet" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#b86bff"/>
      <stop offset="100%" style="stop-color:#7c3aed"/>
    </linearGradient>
    <radialGradient id="glow1" cx="30%" cy="25%" r="50%">
      <stop offset="0%" style="stop-color:#b86bff;stop-opacity:0.3"/>
      <stop offset="100%" style="stop-color:transparent;stop-opacity:0"/>
    </radialGradient>
    <radialGradient id="glow2" cx="70%" cy="75%" r="50%">
      <stop offset="0%" style="stop-color:#ffd55a;stop-opacity:0.25"/>
      <stop offset="100%" style="stop-color:transparent;stop-opacity:0"/>
    </radialGradient>
  </defs>
  <!-- Background -->
  <rect width="512" height="512" rx="110" fill="url(#bg)"/>
  <!-- Glow overlays -->
  <rect width="512" height="512" rx="110" fill="url(#glow1)"/>
  <rect width="512" height="512" rx="110" fill="url(#glow2)"/>
  <!-- k lettermark -->
  <!-- vertical stem -->
  <rect x="130" y="110" width="56" height="292" rx="10" fill="url(#violet)"/>
  <!-- upper diagonal arm -->
  <polygon points="186,256 340,110 312,110 158,256" fill="url(#gold)" rx="8"/>
  <rect x="285" y="110" width="55" height="58" rx="10" fill="url(#gold)"/>
  <!-- lower diagonal arm -->
  <polygon points="186,256 340,402 312,402 158,256" fill="url(#gold)"/>
  <rect x="285" y="344" width="55" height="58" rx="10" fill="url(#gold)"/>
  <!-- dot accent -->
  <circle cx="390" cy="128" r="24" fill="#3bd6ff" opacity="0.85"/>
</svg>
