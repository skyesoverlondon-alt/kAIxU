<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>themeReactorKai — theme switch</title>
<style>
:root{--bg:#05050c;--fg:#f6f7ff;--muted:#9aa0bc;--border:rgba(255,255,255,.12);--cyan:#00f3ff;--gold:#ffd36a;--purple:#a243ff;}*{box-sizing:border-box}
body{margin:0;min-height:100vh;font-family:'Segoe UI',system-ui,sans-serif;background:radial-gradient(circle at 18% 18%,rgba(0,243,255,.08),transparent 36%),radial-gradient(circle at 78% 12%,rgba(255,211,106,.08),transparent 32%),#05050c;color:var(--fg);padding:24px;transition:background .3s,color .3s}
.card{max-width:780px;margin:0 auto;background:rgba(255,255,255,.04);border:1px solid var(--border);border-radius:18px;padding:22px;backdrop-filter:blur(10px);box-shadow:0 30px 80px rgba(0,0,0,.45)}
h1{margin:0 0 8px;font-size:22px;letter-spacing:.3px}
p{margin:0 0 12px;color:var(--muted)}
button{cursor:pointer;padding:10px 14px;border-radius:14px;border:1px solid var(--border);background:linear-gradient(180deg,rgba(0,243,255,.18),rgba(0,243,255,.07));color:var(--fg);font-weight:700;letter-spacing:.2px;box-shadow:0 12px 40px rgba(0,0,0,.45);transition:transform .08s ease}
button:active{transform:translateY(1px) scale(.99)}
.row{display:flex;flex-wrap:wrap;gap:10px;margin:12px 0;align-items:center}
.preview{border:1px solid var(--border);border-radius:16px;padding:16px;margin-top:12px;background:rgba(255,255,255,.04)}
.badge{display:inline-flex;align-items:center;gap:6px;padding:7px 10px;border-radius:999px;border:1px solid var(--border);background:rgba(0,0,0,.28);color:var(--muted);font-size:12px}
</style>
</head>
<body>
  <div class="card">
    <div style="display:flex;justify-content:space-between;align-items:center;gap:10px;flex-wrap:wrap">
      <div>
        <h1>themeReactorKai</h1>
        <p>Switch themes (Neon, Gold, Noir) and persist to localStorage for all pages.</p>
      </div>
      <div class="badge" id="badge">Key: kaixuTheme</div>
    </div>

    <div class="row">
      <button data-theme="default">Neon</button>
      <button data-theme="gold">Gold</button>
      <button data-theme="mono">Noir</button>
    </div>

    <div class="preview" id="preview">
      <div style="font-size:14px;letter-spacing:.08em;text-transform:uppercase;color:var(--cyan);">Preview</div>
      <div style="font-size:24px;font-weight:800;margin:6px 0;color:var(--fg);">Inner Sanctum</div>
      <div style="color:var(--muted);">CTA and cards will follow this palette across the site.</div>
      <div style="margin-top:12px;display:flex;gap:10px;flex-wrap:wrap">
        <span style="padding:6px 12px;border-radius:12px;border:1px solid var(--border);background:rgba(0,0,0,.25);color:var(--fg);">Button</span>
        <span style="padding:6px 12px;border-radius:12px;border:1px solid var(--border);background:rgba(0,0,0,.25);color:var(--fg);">Badge</span>
        <span style="padding:6px 12px;border-radius:12px;border:1px solid var(--border);background:rgba(0,0,0,.25);color:var(--fg);">Highlight</span>
      </div>
    </div>
  </div>
<script>
  const themes={
    default:{'--cyan':'#00f3ff','--purple':'#a243ff','--gold':'#ffd36a','--bg':'#030307'},
    gold:{'--cyan':'#ffd36a','--purple':'#ffb347','--gold':'#ffd36a','--bg':'#0c0a04'},
    mono:{'--cyan':'#d8e4ff','--purple':'#b5b5c7','--gold':'#e6e6e6','--bg':'#0b0c10'}
  };
  function applyTheme(name){
    const cfg=themes[name]||themes.default;
    Object.entries(cfg).forEach(([k,v])=>document.documentElement.style.setProperty(k,v));
    document.body.style.background=cfg['--bg'];
    localStorage.setItem('kaixuTheme',name);
  }
  document.querySelectorAll('button[data-theme]').forEach(btn=>btn.onclick=()=>applyTheme(btn.dataset.theme));
  const saved=localStorage.getItem('kaixuTheme')||'default';
  applyTheme(saved);
</script>
</body>
</html>
