name = "kaixu67"
main = "src/index.js"
compatibility_date = "2025-01-01"
compatibility_flags = ["nodejs_compat"]
account_id = "994dcbdf4404db05122940396a622102"
workers_dev = true

[observability]
[observability.logs]
enabled = true
invocation_logs = true

# Routes — uncomment and set your domain after deploying
# routes = [
#   { pattern = "api.yourdomain.com/*", zone_name = "yourdomain.com" }
# ]

# Workers will serve on https://kaixu-gate.<your-subdomain>.workers.dev by default

[vars]
# Non-secret defaults — override in Cloudflare dashboard > Workers > Settings > Variables
# Secret values (KAIXU_GEMINI_API_KEY, KAIXU_APP_TOKENS) must be set via:
#   wrangler secret put KAIXU_GEMINI_API_KEY
#   wrangler secret put KAIXU_APP_TOKENS
KAIXU_DEFAULT_MODEL = "kAIxU6.7-flash"
KAIXU_OPEN_GATE = "0"
KAIXU_MAX_BODY_BYTES = "5242880"
# KAIXU_GLOBAL_SYSTEM intentionally blank — KAIXU_CANON in worker code handles all identity.
# Setting this causes double-injection and wastes tokens. Leave empty or omit.
KAIXU_GLOBAL_SYSTEM = ""
KAIXU_LOG_LEVEL = "info"
# KAIXU_ALLOWED_ORIGINS = "https://yourapp.netlify.app,https://anotherapp.com"

# ── Admin platform integration ─────────────────────────────────────────────────
# Set both to enable DB-backed token verify + request logging.
# KAIXU_NETLIFY_URL = "https://your-site.netlify.app"
# KAIXU_SERVICE_SECRET must be set via: wrangler secret put KAIXU_SERVICE_SECRET
# KAIXU_RATE_LIMIT = "60"  # max requests per token per 60-second window

# ── KV Namespace (circuit breaker + rate limiting) ────────────────────────────
# Required for circuit breaker. Without it, circuit breaker is silently disabled.
# Setup:
#   1. Cloudflare Workers & Pages → KV → Create namespace → name it "kaixu-kv"
#   2. Copy the namespace ID
#   3. Uncomment the lines below and paste your ID
# [[kv_namespaces]]
# binding = "KAIXU_KV"
# id = "<paste-your-kv-namespace-id-here>"
