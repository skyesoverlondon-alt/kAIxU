name: Deploy Cloudflare Worker

on:
  push:
    branches:
      - main          # every commit keeps the worker alive
  schedule:
    - cron: '0 */6 * * *'   # redeploy + sync secrets every 6 hours automatically
  workflow_dispatch:         # manual trigger from GitHub UI

jobs:
  deploy:
    runs-on: ubuntu-latest
    name: Deploy kaixu67 Worker
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy + sync secrets
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CF_API_TOKEN }}
          accountId: ${{ secrets.CF_ACCOUNT_ID }}
          workingDirectory: worker
          wranglerVersion: '4'
          secrets: |
            KAIXU_GEMINI_API_KEY
            KAIXU_APP_TOKENS
        env:
          KAIXU_GEMINI_API_KEY: ${{ secrets.KAIXU_GEMINI_API_KEY }}
          KAIXU_APP_TOKENS: ${{ secrets.KAIXU_APP_TOKENS }}

      - name: Verify health
        run: |
          sleep 5
          STATUS=$(curl -sf https://kaixu67.skyesoverlondon.workers.dev/v1/health)
          echo "$STATUS"
          echo "$STATUS" | python3 -c "
          import sys,json
          d=json.load(sys.stdin)
          assert d.get('ok') and d.get('keyConfigured') and d.get('authConfigured'), 'Worker unhealthy after deploy!'
          print('Worker healthy.')
          "

