name: Deploy Cloudflare Worker

on:
  push:
    branches:
      - main          # every commit keeps the worker alive
  schedule:
    - cron: '0 */6 * * *'   # redeploy + sync secrets every 6 hours automatically
  workflow_dispatch:         # manual trigger from GitHub UI

jobs:
  deploy:
    runs-on: ubuntu-latest
    name: Deploy kaixu67 Worker
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install wrangler
        run: npm install -g wrangler@4.69.0

      - name: Deploy worker code
        working-directory: worker
        run: |
          # Delete old worker first to clear stale workers.dev trigger state
          curl -s -X DELETE \
            "https://api.cloudflare.com/client/v4/accounts/${CLOUDFLARE_ACCOUNT_ID}/workers/scripts/kaixu67" \
            -H "Authorization: Bearer ${CLOUDFLARE_API_TOKEN}" \
            -H "Content-Type: application/json" | python3 -c "import sys,json; r=json.load(sys.stdin); print('Delete result:', r.get('success'), r.get('errors'))" || true
          sleep 3
          wrangler deploy

      - name: Sync secrets
        working-directory: worker
        run: |
          printf '%s' "$KAIXU_GEMINI_API_KEY" | wrangler secret put KAIXU_GEMINI_API_KEY
          printf '%s' "$KAIXU_APP_TOKENS"      | wrangler secret put KAIXU_APP_TOKENS
        env:
          KAIXU_GEMINI_API_KEY: ${{ secrets.KAIXU_GEMINI_API_KEY }}
          KAIXU_APP_TOKENS: ${{ secrets.KAIXU_APP_TOKENS }}

      - name: Verify health
        run: |
          for i in 1 2 3 4 5; do
            sleep 10
            STATUS=$(curl -s https://kaixu67.skyesoverlondon.workers.dev/v1/health)
            echo "Attempt $i: $STATUS"
            if echo "$STATUS" | python3 -c "import sys,json; d=json.load(sys.stdin); exit(0 if d.get('ok') else 1)" 2>/dev/null; then
              echo "Worker healthy!"
              exit 0
            fi
          done
          echo "Worker did not become healthy after 50s"
          exit 1

