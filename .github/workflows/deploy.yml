name: Deploy kAIxU Worker

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  validate:
    name: Validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: worker/package.json

      - name: Install worker deps
        working-directory: worker
        run: npm ci

      - name: Syntax check worker
        working-directory: worker
        run: node --input-type=module < src/index.js

  deploy:
    name: Deploy to Cloudflare
    needs: validate
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment:
      name: production
      url: https://kaixu67.skyesoverlondon.workers.dev

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: worker/package.json

      - name: Install worker deps
        working-directory: worker
        run: npm ci

      - name: Deploy worker
        working-directory: worker
        run: npx wrangler deploy --keep-vars
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
