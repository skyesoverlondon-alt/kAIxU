
[build]
  publish = "public"

[functions]
directory = "netlify/functions"

[[plugins]]
package = "@netlify/plugin-functions-install-core"

# API routes (stable paths your apps will call)
[[redirects]]
  from = "/v1/health"
  to = "/.netlify/functions/v1-proxy/v1/health"
  status = 200

[[redirects]]
  from = "/v1/models"
  to = "/.netlify/functions/v1-proxy/v1/models"
  status = 200

[[redirects]]
  from = "/v1/generate"
  to = "/.netlify/functions/v1-proxy/v1/generate"
  status = 200

# Optional streaming endpoint (SSE)
[[redirects]]
  from = "/v1/stream"
  to = "/.netlify/functions/v1-proxy/v1/stream"
  status = 200

[[redirects]]
  from = "/v1/embeddings"
  to = "/.netlify/functions/v1-proxy/v1/embeddings"
  status = 200

# Client beacon / telemetry sink
[[redirects]]
  from = "/v1/telemetry"
  to = "/.netlify/functions/kaixu-telemetry"
  status = 200

# ── Admin API routes ───────────────────────────────────────────────────────────
# Service-secret auth (called by Cloudflare Worker)
[[redirects]]
  from = "/api/admin/token/verify"
  to = "/.netlify/functions/admin-token-verify"
  status = 200

[[redirects]]
  from = "/api/admin/log"
  to = "/.netlify/functions/admin-log"
  status = 200

# Admin Identity auth (called by adminKai.html)
[[redirects]]
  from = "/api/admin/tokens/create"
  to = "/.netlify/functions/admin-tokens-create"
  status = 200

[[redirects]]
  from = "/api/admin/tokens/list"
  to = "/.netlify/functions/admin-tokens-list"
  status = 200

[[redirects]]
  from = "/api/admin/tokens/revoke"
  to = "/.netlify/functions/admin-tokens-revoke"
  status = 200

[[redirects]]
  from = "/api/admin/usage/summary"
  to = "/.netlify/functions/admin-usage-summary"
  status = 200

[[redirects]]
  from = "/api/admin/usage/logs"
  to = "/.netlify/functions/admin-usage-logs"
  status = 200

[[redirects]]
  from = "/api/admin/events"
  to = "/.netlify/functions/admin-events"
  status = 200

[[redirects]]
  from = "/api/admin/health-env"
  to = "/.netlify/functions/health-env"
  status = 200
# ── Customer self-serve API ────────────────────────────────────────────────────
# Public (no auth required)
[[redirects]]
  from = "/api/customer/signup"
  to = "/.netlify/functions/customer-signup"
  status = 200

[[redirects]]
  from = "/api/customer/verify"
  to = "/.netlify/functions/customer-verify"
  status = 200

# Stripe webhook (no session auth — uses Stripe signature)
[[redirects]]
  from = "/api/customer/stripe-webhook"
  to = "/.netlify/functions/stripe-webhook"
  status = 200

# Session-authenticated customer routes
[[redirects]]
  from = "/api/customer/me"
  to = "/.netlify/functions/customer-me"
  status = 200

[[redirects]]
  from = "/api/customer/token/issue"
  to = "/.netlify/functions/customer-token-issue"
  status = 200

[[redirects]]
  from = "/api/customer/checkout"
  to = "/.netlify/functions/customer-checkout"
  status = 200

[[redirects]]
  from = "/api/customer/billing"
  to = "/.netlify/functions/customer-billing"
  status = 200

[[redirects]]
  from = "/api/customer/logout"
  to = "/.netlify/functions/customer-logout"
  status = 200